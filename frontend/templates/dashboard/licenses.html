<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Загрузить организацию</title>
  <link rel="stylesheet" href="/static/css/licenses.css" />
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div>
      <div class="logo">
        <img src="/static/img/logo.svg" alt="logo" class="logo">
      </div>
      <nav class="menu">
        <a href="/licenses" class="menu-item active">
          <span class="icon">🔑</span> Лицензии
        </a>
        <a href="/organizations" class="menu-item">
          <span class="icon">🏢</span> Организации
        </a>
        <a href="/settings" class="menu-item">
          <span class="icon">⚙️</span> Настройки
        </a>
      </nav>
    </div>
    <div class="sidebar-footer">
      <div class="user-badge">А</div>
      <button class="logout">Выйти</button>
    </div>
  </aside>

  <main class="content">

    <header class="topbar">
      <div>
        <h1>Загрузить организацию</h1>
        <span class="status">Новая запись</span>
      </div>
      <div class="topbar-actions">
        <button class="ghost-btn" onclick="resetForm()">Сбросить</button>
        <button class="primary-btn" onclick="submitForm()">Сохранить</button>
      </div>
    </header>

    <div class="upload-layout">

      <div class="upload-col">

        <div class="section-card">
          <div class="section-card-title">
            <span class="section-icon">📄</span>
            Файл лицензии
          </div>
          <div class="dropzone" id="dropzone"
               ondragover="onDragOver(event)"
               ondragleave="onDragLeave(event)"
               ondrop="onDrop(event)"
               onclick="document.getElementById('fileInput').click()">
            <div class="dropzone-icon">⬆️</div>
            <p class="dropzone-title">Перетащите файл сюда</p>
            <p class="dropzone-hint">.enc — поля заполнятся автоматически</p>
            <input type="file" id="fileInput" accept=".enc" hidden onchange="handleFile(event)" />
          </div>
          <div class="file-chosen" id="fileChosen">
            <span class="file-icon">📎</span>
            <span class="file-name" id="fileName">—</span>
            <button class="file-remove" onclick="removeFile()">✕</button>
          </div>
          <div class="upload-status" id="uploadStatus"></div>
        </div>

        <div class="section-card">
          <div class="section-card-title">
            <span class="section-icon">🏢</span>
            Организация
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Название *</label>
              <input type="text" id="orgName" placeholder="ООО «Название»" />
            </div>
            <div class="form-group">
              <label>ИНН *</label>
              <input type="text" id="orgInn" placeholder="7700000000" maxlength="12" />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Email</label>
              <input type="email" id="orgEmail" placeholder="admin@company.ru" />
            </div>
            <div class="form-group">
              <label>Тариф</label>
              <select id="orgTariff">
                <option value="">— Выбрать —</option>
                <option>Starter</option>
                <option>Pro</option>
                <option>Enterprise</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Количество лицензий</label>
              <input type="number" id="orgLicCount" placeholder="10" min="1" />
            </div>
            <div class="form-group">
              <label>Дата окончания</label>
              <input type="text" id="orgExpiry" placeholder="ДД.ММ.ГГГГ" />
            </div>
          </div>
        </div>

      </div>

      <div class="upload-col">

        <div class="section-card">
          <div class="section-card-title">
            <span class="section-icon">🔐</span>
            Контрольная сумма
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Алгоритм</label>
              <select id="checksumAlgo">
                <option>SHA-256</option>
              </select>
            </div>
            <div class="form-group" style="flex:2">
              <label>Значение</label>
              <div class="input-copy-wrap">
                <input type="text" id="checksumValue" placeholder="e3b0c44298fc1c149afb…" />
                <button class="copy-btn" onclick="copyChecksum()" title="Копировать">⧉</button>
              </div>
            </div>
          </div>
          <div class="form-group">
            <label>Статус проверки</label>
            <div class="checksum-status" id="checksumStatus">
              <span class="cs-dot cs-neutral"></span>
              <span id="csText">Не проверено</span>
              <button class="cs-verify-btn" onclick="verifyChecksum()">Проверить</button>
            </div>
          </div>
        </div>

        <div class="section-card">
          <div class="section-card-title">
            <span class="section-icon">🖥️</span>
            Информация о хосте
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Hostname / IP</label>
              <input type="text" id="hostName" placeholder="192.168.1.1" />
            </div>
            <div class="form-group">
              <label>Операционная система</label>
              <select id="hostOs">
                <option value="">— Выбрать —</option>
                <option>Windows Server 2022</option>
                <option>Windows Server 2019</option>
                <option>Ubuntu 22.04</option>
                <option>Ubuntu 20.04</option>
                <option>CentOS 8</option>
                <option>Astra Linux</option>
                <option>Другое</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>MAC-адрес</label>
              <input type="text" id="hostMac" placeholder="AA:BB:CC:DD:EE:FF" maxlength="17" />
            </div>
            <div class="form-group">
              <label>UUID / Serial</label>
              <input type="text" id="hostUuid" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" />
            </div>
          </div>
          <div class="form-group">
            <label>Комментарий</label>
            <textarea id="hostComment" placeholder="Дополнительная информация о хосте…" rows="3"></textarea>
          </div>
        </div>

      </div>
    </div>

    <div class="bottom-bar">
      <p class="bottom-bar-hint">* — обязательные поля</p>
      <div class="bottom-bar-actions">
        <a href="/licenses" class="ghost-btn">Отмена</a>
        <button class="ghost-btn" onclick="resetForm()">Сбросить</button>
        <button class="primary-btn" onclick="submitForm()">💾 Сохранить</button>
      </div>
    </div>

  </main>
</div>

<script src="/static/dashboard/licenses.js"></script>

</body>
</html>
