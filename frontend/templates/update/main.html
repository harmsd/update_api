<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Обновление дистрибутива</title>
  <link rel="stylesheet" href="../../static/css/update.css"/>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <img src="../../static/img/logo.svg" alt="logo" class="logo">
      </div>

      <nav class="menu">
        <a class="menu-item" href="#">Лицензия</a>
        <a class="menu-item active" href="#">Обновления</a>
        <a class="menu-item" href="#">Поддержка</a>
      </nav>

      <div class="sidebar-footer">
    <div class="user-badge">H</div>
    <button class="logout">Выход</button>
  </div>

    </aside>

    <main class="content">
      <header class="topbar">
        <div>
          <h1>Обновление дистрибутива</h1>
          <span class="status">доступные версии</span>
        </div>

        <div class="topbar-actions">
          <input type="search" placeholder="Поиск версии..." />
          <button class="primary-btn">Найти</button>
        </div>
      </header>

      <section class="card">
        <div class="section-header">
          <div>
            <h3>Доступные версии</h3>
            <p>Выберите нужную версию для скачивания</p>
          </div>
        </div>

        <ul class="update-list">

          <li>
            <div class="update-info">
              <strong>v3.2.1</strong>
              <small>Дата: 15.03.2026</small>
            </div>
            <div class="actions">
              <button class="ghost-btn">Подробнее</button>
              <button class="primary-btn">Скачать</button>
            </div>
          </li>

          <li>
            <div class="update-info">
              <strong>v3.1.8</strong>
              <small>Дата: 02.02.2026</small>
            </div>
            <div class="actions">
              <button class="ghost-btn">Подробнее</button>
              <button class="primary-btn">Скачать</button>
            </div>
          </li>

          <li>
            <div class="update-info">
              <strong>v3.0.5</strong>
              <small>Дата: 18.12.2025</small>
            </div>
            <div class="actions">
              <button class="ghost-btn">Подробнее</button>
              <button class="primary-btn">Скачать</button>
            </div>
          </li>

          <li>
            <div class="update-info">
              <strong>v2.9.9</strong>
              <small>Дата: 01.11.2025</small>
            </div>
            <div class="actions">
              <button class="ghost-btn">Подробнее</button>
              <button class="primary-btn">Скачать</button>
            </div>
          </li>

        </ul>
      </section>
    </main>
  </div>
</body>
</html>
