<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Пользователи — OnyX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/onyx.css"/>
  <link rel="stylesheet" href="/static/css/dashboard.css"/>
</head>
<body>
<div class="app">
  {% set page = 'admin' %}
  {% include 'partials/_sidebar_admin.html' %}

  <main class="content">
    <div class="topbar">
      <div class="topbar-breadcrumb">
        <span class="bc-root">OnyX</span>
        <svg class="bc-sep" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
        <span class="bc-page">Пользователи</span>
      </div>
      <div class="topbar-search-wrap">
        <svg class="search-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#6b6b80" stroke-width="1.6"><path d="M21 21l-6-6m2-5a7 7 0 1 1-14 0 7 7 0 0 1 14 0z"/></svg>
        <input class="topbar-search" type="search" placeholder="Поиск…"/>
      </div>
      <div class="topbar-icon-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6b6b80" stroke-width="1.6"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </div>
    </div>

    <div class="page-header">
      <div>
        <h1>Пользователи</h1>
        <span class="badge badge-purple" id="activeCount">—</span>
      </div>
      <div class="topbar-actions">
        <select class="topbar-select" id="roleFilter">
          <option value="">Все роли</option>
          <option value="admin">Администратор</option>
          <option value="operator">Оператор</option>
          <option value="viewer">Наблюдатель</option>
        </select>
        <input class="topbar-search-input" type="search" id="searchInput" placeholder="Поиск пользователя…"/>
        <button class="btn btn-primary btn-sm" onclick="openCreateModal()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M8.5 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM20 8v6M23 11h-6"/></svg>
          Добавить
        </button>
      </div>
    </div>

    <div class="stats-grid">
      <div class="card stat-card">
        <p class="stat-label">Всего пользователей</p>
        <p class="stat-value text-purple" id="statTotal">—</p>
      </div>
      <div class="card stat-card">
        <p class="stat-label">Активных аккаунтов</p>
        <p class="stat-value text-green" id="statActive">—</p>
      </div>
      <div class="card stat-card">
        <p class="stat-label">Администраторов</p>
        <p class="stat-value text-red" id="statAdmins">—</p>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Пользователь</th><th>Логин</th><th>Email</th>
            <th>Роль</th><th>Статус</th><th>Создан</th><th>Действия</th>
          </tr>
        </thead>
        <tbody id="usersTableBody">
          <tr><td colspan="7" style="text-align:center;color:var(--muted);padding:2rem">Загрузка…</td></tr>
        </tbody>
      </table>
      <div class="pagination">
        <span id="paginationInfo">—</span>
        <div class="page-btns" id="pageBtns"></div>
      </div>
    </div>
  </main>
</div>

<!-- Edit modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-close-row">
      <div><h2>Редактировать пользователя</h2><p class="modal-subtitle" id="editSubtitle"></p></div>
      <button class="modal-close" onclick="closeEditModal()">✕</button>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Имя</label><input class="form-control" id="editName" placeholder="Имя"/></div>
      <div class="form-group"><label class="form-label">Логин</label><input class="form-control" id="editUsername" placeholder="username"/></div>
    </div>
    <div class="form-group"><label class="form-label">Email</label><input class="form-control" type="email" id="editEmail" placeholder="user@example.com"/></div>
    <div class="form-group"><label class="form-label">Роль</label>
      <select class="form-control" id="editRole">
        <option value="admin">Администратор</option>
        <option value="operator">Оператор</option>
        <option value="viewer">Наблюдатель</option>
      </select>
    </div>
    <div class="form-group"><label class="form-label">Новый пароль</label><input class="form-control" type="password" id="editPassword" placeholder="Оставьте пустым, чтобы не менять"/></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeEditModal()">Отмена</button>
      <button class="btn btn-primary" onclick="saveEdit()">💾 Сохранить</button>
    </div>
  </div>
</div>

<!-- Create modal -->
<div class="modal-overlay" id="createModal">
  <div class="modal">
    <div class="modal-close-row">
      <div><h2>Новый пользователь</h2></div>
      <button class="modal-close" onclick="closeCreateModal()">✕</button>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Имя</label><input class="form-control" id="createName" placeholder="Имя"/></div>
      <div class="form-group"><label class="form-label">Логин <span class="req">*</span></label><input class="form-control" id="createUsername" placeholder="username"/></div>
    </div>
    <div class="form-group"><label class="form-label">Email <span class="req">*</span></label><input class="form-control" type="email" id="createEmail" placeholder="user@example.com"/></div>
    <div class="form-group"><label class="form-label">Роль</label>
      <select class="form-control" id="createRole">
        <option value="operator">Оператор</option>
        <option value="viewer">Наблюдатель</option>
        <option value="admin">Администратор</option>
      </select>
    </div>
    <div class="form-group"><label class="form-label">Пароль <span class="req">*</span></label><input class="form-control" type="password" id="createPassword" placeholder="Пароль"/></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeCreateModal()">Отмена</button>
      <button class="btn btn-primary" id="createSubmitBtn" onclick="createUser()">Создать пользователя</button>
    </div>
  </div>
</div>

<script src="/static/dashboard/admin.js"></script>
<script src="/static/api/script.js"></script>
</body>
</html>
